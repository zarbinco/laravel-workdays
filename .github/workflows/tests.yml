name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php-version }} / Laravel ${{ matrix.laravel }} / ${{ matrix.dependencies }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
            dependencies: prefer-lowest
            dependency-options: '--prefer-lowest --prefer-stable'
          - php-version: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
            dependencies: highest
            dependency-options: '--prefer-stable'
          - php-version: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
            dependencies: highest
            dependency-options: '--prefer-stable'
          - php-version: '8.4'
            laravel: '^12.0'
            testbench: '^10.0'
            dependencies: highest
            dependency-options: '--prefer-stable'
          - php-version: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
            dependencies: highest
            dependency-options: '--prefer-stable'
          - php-version: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'
            dependencies: highest
            dependency-options: '--prefer-stable'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, sqlite3, pdo_sqlite
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Set Laravel Version
        run: |
          composer require \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/filesystem:${{ matrix.laravel }}" \
            --no-interaction \
            --no-update

          composer require \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --dev \
            --no-interaction \
            --no-update

      - name: Install Dependencies
        run: |
          composer update \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            ${{ matrix.dependency-options }}

      - name: Run Tests
        run: composer test
